trigger:
  branches:
    include:
      - main

pool:
  name: Default   # self-hosted agent running on your laptop

variables:
  imageName: employeeprofileapp
  dockerHubRepo: prasidsash/employeeprofileapp

stages:

# ==============================
# CI STAGE
# Build and Push Docker Image
# ==============================

- stage: Build
  displayName: Build and Push Image

  jobs:
  - job: BuildAndPush
    displayName: Docker Build and Push

    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build and Push Image to Docker Hub
      inputs:
        containerRegistry: dockerhub-connection
        repository: $(dockerHubRepo)
        command: buildAndPush
        Dockerfile: src/Employeeprofileapp/Dockerfile
        tags: |
          $(Build.BuildId)

    - script: |
        echo "Updating Helm values-dev.yaml with new image tag"

        sed -i "s/tag:.*/tag: $(Build.BuildId)/" helm/app-chart/values-dev.yaml

        echo "Updated Helm values file"

        cat helm/app-chart/values-dev.yaml

      displayName: Update Helm Image Tag


# ==============================
# CD STAGE
# Terraform Deployment
# ==============================

- stage: Deploy
  displayName: Deploy Application

  dependsOn: Build

  jobs:

  - job: TerraformDeploy
    displayName: Terraform Apply Deployment

    steps:

    - checkout: self

    - script: |
        echo "Starting Terraform Deployment"

        cd terraform/environments/dev

        terraform init

        terraform plan

        terraform apply -auto-approve

      displayName: Terraform Apply
