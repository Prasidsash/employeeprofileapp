trigger:
  branches:
    include:
      - main

pool:
  name: Default

variables:
  dockerHubRepo: prasidsash/employeeprofileapp
  imageTag: $(Build.BuildId)

stages:

# ======================================================
# CI STAGE — BUILD AND PUSH IMAGE
# ======================================================

- stage: CI
  displayName: Build and Push Docker Image

  jobs:
  - job: Build
    displayName: Build and Push Image

    steps:

    # Checkout repository
    - checkout: self

    # Print build information
    - powershell: |
        Write-Host "================================"
        Write-Host "Starting CI Build"
        Write-Host "Build ID: $(Build.BuildId)"
        Write-Host "Image Tag: $(imageTag)"
        Write-Host "Commit SHA: $(Build.SourceVersion)"
        Write-Host "================================"
      displayName: Print Build Info

    # Build and push Docker image
    - task: Docker@2
      displayName: Build and Push Image to DockerHub
      inputs:
        containerRegistry: dockerhub-connection
        repository: $(dockerHubRepo)
        command: buildAndPush
        Dockerfile: $(Build.SourcesDirectory)/Dockerfile
        tags: |
          $(imageTag)
          latest
          $(Build.SourceVersion)

    # Save image tag as artifact
    - powershell: |
        $tag = "$(imageTag)"
        $path = "$(Build.ArtifactStagingDirectory)\imageTag.txt"
        Write-Host "Saving image tag to $path"
        $tag | Out-File -FilePath $path -Encoding utf8
      displayName: Save Image Tag

    # Publish artifact for CD pipeline
    - publish: $(Build.ArtifactStagingDirectory)/imageTag.txt
      artifact: imageTag
      displayName: Publish Image Tag Artifact

    # Logout Docker (avoids Windows agent lock issue)
    - powershell: |
        docker logout
      displayName: Docker Logout