trigger:
  branches:
    include:
      - main

pool:
  name: Default     # Your self-hosted agent

variables:
  environment: dev
  imageName: employeeprofileapp
  dockerHubRepo: prasidsash/employeeprofileapp
  imageTag: $(Build.BuildId)

stages:

# ======================================================
# CI STAGE – BUILD AND PUSH IMAGE
# ======================================================

- stage: Build
  displayName: Build and Push Image

  jobs:

  - job: BuildAndPush
    displayName: Docker Build and Push

    steps:

    - checkout: self

    - script: |
        echo =================================
        echo Starting CI Pipeline
        echo Environment = $(environment)
        echo Build ID = $(Build.BuildId)
        echo =================================
      displayName: Print Build Info

    - task: Docker@2
      displayName: Build and Push Image to Docker Hub
      inputs:
        containerRegistry: dockerhub-connection
        repository: $(dockerHubRepo)
        command: buildAndPush
        Dockerfile: Dockerfile
        tags: |
          $(imageTag)

    # --------------------------------------------------
    # Update Helm values file with new image tag
    # Windows PowerShell (not sed)
    # --------------------------------------------------

    - powershell: |
        Write-Host "Updating Helm values-dev.yaml with image tag $(imageTag)"

        $file = "helm/app-chart/values-dev.yaml"

        (Get-Content $file) -replace 'tag:.*', "tag: $(imageTag)" | Set-Content $file

        Write-Host "Updated Helm values file:"
        Get-Content $file

      displayName: Update Helm Image Tag


# ======================================================
# CD STAGE – TERRAFORM DEPLOYMENT
# ======================================================

- stage: Deploy
  displayName: Deploy Application
  dependsOn: Build

  jobs:

  - job: TerraformDeploy
    displayName: Terraform Apply

    steps:

    - checkout: self

    - powershell: |

        Write-Host "================================="
        Write-Host "Starting Terraform Deployment"
        Write-Host "Environment: $(environment)"
        Write-Host "================================="

        cd terraform/environments/$(environment)

        terraform init

        terraform plan -var-file="$(environment).tfvars"

        terraform apply -auto-approve -var-file="$(environment).tfvars"

      displayName: Terraform Apply
