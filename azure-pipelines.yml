trigger:
  branches:
    include:
      - main

pool:
  name: Default   # Self-hosted agent

variables:
  dockerHubRepo: prasidsash/employeeprofileapp
  imageTag: $(Build.BuildId)

stages:

# ======================================================
# CI STAGE — BUILD AND PUSH IMAGE
# ======================================================

- stage: Build
  displayName: Build Docker Image

  jobs:

  - job: Build
    displayName: Build and Push Image

    steps:

    - checkout: self

    - powershell: |
        Write-Host "================================"
        Write-Host "Starting CI Build"
        Write-Host "Build ID: $(Build.BuildId)"
        Write-Host "================================"
      displayName: Print Build Info

    - task: Docker@2
      displayName: Build and Push Image to DockerHub
      inputs:
        containerRegistry: dockerhub-connection
        repository: $(dockerHubRepo)
        command: buildAndPush
        Dockerfile: Dockerfile
        tags: |
          $(imageTag)



# ======================================================
# DEV DEPLOYMENT
# ======================================================

- stage: Deploy_Dev
  displayName: Deploy to DEV
  dependsOn: Build

  jobs:

  - job: DeployDev

    steps:

    - checkout: self

    # Terraform Infrastructure
    - powershell: |

        Write-Host "================================"
        Write-Host "Terraform DEV Deployment"
        Write-Host "================================"

        cd terraform/environments/dev

        terraform init
        terraform plan -var-file="dev.tfvars"
        terraform apply -auto-approve -var-file="dev.tfvars"

      displayName: Terraform DEV


    # Helm Application Deployment
    - powershell: |

        Write-Host "================================"
        Write-Host "Helm Deployment DEV"
        Write-Host "Image Tag: $(imageTag)"
        Write-Host "================================"

        $namespace="employeeprofileapp-dev"

        helm upgrade --install employeeprofileapp `
          ./helm/app-chart `
          --namespace $namespace `
          --create-namespace `
          -f ./helm/app-chart/values-dev.yaml `
          --set image.repository=$(dockerHubRepo) `
          --set image.tag=$(imageTag)

      displayName: Helm DEV



# ======================================================
# QA DEPLOYMENT
# ======================================================

- stage: Deploy_QA
  displayName: Deploy to QA
  dependsOn: Deploy_Dev

  jobs:

  - job: DeployQA

    steps:

    - checkout: self

    - powershell: |

        Write-Host "Terraform QA Deployment"

        cd terraform/environments/qa

        terraform init
        terraform apply -auto-approve -var-file="qa.tfvars"

      displayName: Terraform QA


    - powershell: |

        Write-Host "Helm Deployment QA"

        $namespace="employeeprofileapp-qa"

        helm upgrade --install employeeprofileapp `
          ./helm/app-chart `
          --namespace $namespace `
          --create-namespace `
          -f ./helm/app-chart/values-qa.yaml `
          --set image.repository=$(dockerHubRepo) `
          --set image.tag=$(imageTag)

      displayName: Helm QA



# ======================================================
# UAT DEPLOYMENT
# ======================================================

- stage: Deploy_UAT
  displayName: Deploy to UAT
  dependsOn: Deploy_QA

  jobs:

  - job: DeployUAT

    steps:

    - checkout: self

    - powershell: |

        Write-Host "Terraform UAT Deployment"

        cd terraform/environments/uat

        terraform init
        terraform apply -auto-approve -var-file="uat.tfvars"

      displayName: Terraform UAT


    - powershell: |

        Write-Host "Helm Deployment UAT"

        $namespace="employeeprofileapp-uat"

        helm upgrade --install employeeprofileapp `
          ./helm/app-chart `
          --namespace $namespace `
          --create-namespace `
          -f ./helm/app-chart/values-uat.yaml `
          --set image.repository=$(dockerHubRepo) `
          --set image.tag=$(imageTag)

      displayName: Helm UAT



# ======================================================
# PROD DEPLOYMENT
# ======================================================

- stage: Deploy_Prod
  displayName: Deploy to PROD
  dependsOn: Deploy_UAT

  jobs:

  - job: DeployProd

    steps:

    - checkout: self

    - powershell: |

        Write-Host "Terraform PROD Deployment"

        cd terraform/environments/prod

        terraform init
        terraform apply -auto-approve -var-file="prod.tfvars"

      displayName: Terraform PROD


    - powershell: |

        Write-Host "Helm Deployment PROD"

        $namespace="employeeprofileapp-prod"

        helm upgrade --install employeeprofileapp `
          ./helm/app-chart `
          --namespace $namespace `
          --create-namespace `
          -f ./helm/app-chart/values-prod.yaml `
          --set image.repository=$(dockerHubRepo) `
          --set image.tag=$(imageTag)

      displayName: Helm PROD