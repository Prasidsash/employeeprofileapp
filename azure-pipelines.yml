trigger:
  branches:
    include:
      - main

pool:
  name: Default   # Self-hosted agent

variables:
  dockerHubRepo: prasidsash/employeeprofileapp
  imageTag: $(Build.BuildId)

stages:

# ======================================================
# CI STAGE — BUILD AND PUSH IMAGE
# ======================================================

- stage: Build
  displayName: CI - Build and Push Docker Image

  jobs:
  - job: Build
    displayName: Build and Push Image

    steps:

    - checkout: self

    - powershell: |
        Write-Host "================================"
        Write-Host "Starting CI Build"
        Write-Host "Build ID: $(Build.BuildId)"
        Write-Host "Image Tag: $(imageTag)"
        Write-Host "================================"
      displayName: Print Build Info

    - task: Docker@2
      displayName: Build and Push Image to DockerHub
      inputs:
        containerRegistry: dockerhub-connection
        repository: $(dockerHubRepo)
        command: buildAndPush
        Dockerfile: Dockerfile
        tags: |
          $(imageTag)

    - powershell: |
        Write-Host "Docker image pushed successfully:"
        Write-Host "$(dockerHubRepo):$(imageTag)"
      displayName: Verify Image



# ======================================================
# DEV DEPLOYMENT
# ======================================================

- stage: Deploy_Dev
  displayName: Deploy to DEV
  dependsOn: Build

  jobs:
  - deployment: DeployDev
    displayName: Helm Deploy DEV
    environment: dev

    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - powershell: |

              Write-Host "================================"
              Write-Host "Helm Deployment DEV"
              Write-Host "Image Tag: $(imageTag)"
              Write-Host "================================"

              $namespace="employeeprofileapp-dev"

              helm upgrade --install employeeprofileapp `
                ./helm/app-chart `
                --namespace $namespace `
                --create-namespace `
                -f ./helm/app-chart/values-dev.yaml `
                --set image.repository=$(dockerHubRepo) `
                --set image.tag=$(imageTag)

              Write-Host "Checking rollout status..."

              kubectl rollout status deployment/employeeprofileapp-employeeprofileapp -n $namespace

            displayName: Helm DEV



# ======================================================
# QA DEPLOYMENT
# ======================================================

- stage: Deploy_QA
  displayName: Deploy to QA
  dependsOn: Deploy_Dev

  jobs:
  - deployment: DeployQA
