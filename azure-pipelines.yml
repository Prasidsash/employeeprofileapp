trigger:
  branches:
    include:
      - main

pool:
  name: Default   # Self-hosted agent

variables:
  dockerHubRepo: prasidsash/employeeprofileapp
  imageTag: $(Build.BuildId)

stages:

# ======================================================
# CI STAGE — BUILD AND PUSH IMAGE
# ======================================================

- stage: Build
  displayName: Build Docker Image

  jobs:

  - job: Build
    displayName: Build and Push Image

    steps:

    - checkout: self

    - powershell: |
        Write-Host "================================"
        Write-Host "Starting CI Build"
        Write-Host "Build ID: $(Build.BuildId)"
        Write-Host "================================"
      displayName: Print Build Info

    - task: Docker@2
      displayName: Build and Push Image to DockerHub
      inputs:
        containerRegistry: dockerhub-connection
        repository: $(dockerHubRepo)
        command: buildAndPush
        Dockerfile: Dockerfile
        tags: |
          $(imageTag)



# ======================================================
# DEV DEPLOYMENT
# ======================================================

- stage: Deploy_Dev
  displayName: Deploy to DEV
  dependsOn: Build

  jobs:

  - job: DeployDev
    displayName: Helm Deploy DEV

    steps:

    - checkout: self

    - powershell: |

        Write-Host "================================"
        Write-Host "Helm Deployment DEV"
        Write-Host "Image Tag: $(imageTag)"
        Write-Host "================================"

        $namespace="employeeprofileapp-dev"

        helm upgrade --install employeeprofileapp `
          ./helm/app-chart `
          --namespace $namespace `
          -f ./helm/app-chart/values-dev.yaml `
          --set image.repository=$(dockerHubRepo) `
          --set image.tag=$(imageTag)

      displayName: Helm DEV



# ======================================================
# QA DEPLOYMENT
# ======================================================

- stage: Deploy_QA
  displayName: Deploy to QA
  dependsOn: Deploy_Dev

  jobs:

  - job: DeployQA
    displayName: Helm Deploy QA

    steps:

    - checkout: self

    - powershell: |

        Write-Host "================================"
        Write-Host "Helm Deployment QA"
        Write-Host "Image Tag: $(imageTag)"
        Write-Host "================================"

        $namespace="employeeprofileapp-qa"

        helm upgrade --install employeeprofileapp `
          ./helm/app-chart `
          --namespace $namespace `
          -f ./helm/app-chart/values-qa.yaml `
          --set image.repository=$(dockerHubRepo) `
          --set image.tag=$(imageTag)

      displayName: Helm QA



# ======================================================
# UAT DEPLOYMENT
# ======================================================

- stage: Deploy_UAT
  displayName: Deploy to UAT
  dependsOn: Deploy_QA

  jobs:

  - job: DeployUAT
    displayName: Helm Deploy UAT

    steps:

    - checkout: self

    - powershell: |

        Write-Host "================================"
        Write-Host "Helm Deployment UAT"
        Write-Host "Image Tag: $(imageTag)"
        Write-Host "================================"

        $namespace="employeeprofileapp-uat"

        helm upgrade --install employeeprofileapp `
          ./helm/app-chart `
          --namespace $namespace `
          -f ./helm/app-chart/values-uat.yaml `
          --set image.repository=$(dockerHubRepo) `
          --set image.tag=$(imageTag)

      displayName: Helm UAT



# ======================================================
# PROD DEPLOYMENT
# ======================================================

- stage: Deploy_Prod
  displayName: Deploy to PROD
  dependsOn: Deploy_UAT

  jobs:

  - job: DeployProd
    displayName: Helm Deploy PROD

    steps:

    - checkout: self

    - powershell: |

        Write-Host "================================"
        Write-Host "Helm Deployment PROD"
        Write-Host "Image Tag: $(imageTag)"
        Write-Host "================================"

        $namespace="employeeprofileapp-prod"

        helm upgrade --install employeeprofileapp `
          ./helm/app-chart `
          --namespace $namespace `
          -f ./helm/app-chart/values-prod.yaml `
          --set image.repository=$(dockerHubRepo) `
          --set image.tag=$(imageTag)

      displayName: Helm PROD