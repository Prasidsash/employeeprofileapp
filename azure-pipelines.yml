trigger:
  branches:
    include:
      - main

pool:
  name: Default   # Self-hosted agent running on your laptop

variables:
  imageName: employeeprofileapp
  dockerHubRepo: prasidsash/employeeprofileapp

stages:

# ======================================================
# CI STAGE – BUILD AND PUSH IMAGE
# ======================================================

- stage: Build
  displayName: Build and Push Image

  jobs:
  - job: BuildAndPush
    displayName: Docker Build and Push

    steps:

    - checkout: self

    - script: |
        echo =================================
        echo Starting CI Pipeline
        echo Build ID = $(Build.BuildId)
        echo =================================
      displayName: Print Build Information

    - task: Docker@2
      displayName: Build and Push Image to Docker Hub
      inputs:
        containerRegistry: dockerhub-connection
        repository: $(dockerHubRepo)
        command: buildAndPush
        Dockerfile: Dockerfile
        tags: |
          $(Build.BuildId)

    # FIXED STEP FOR WINDOWS AGENT
    - powershell: |
        Write-Host "Updating Helm values-dev.yaml with new image tag"

        $file = "helm/app-chart/values-dev.yaml"

        (Get-Content $file) -replace 'tag:.*', "tag: $(Build.BuildId)" | Set-Content $file

        Write-Host "Updated values-dev.yaml"
        Get-Content $file
      displayName: Update Helm Image Tag


# ======================================================
# CD STAGE – TERRAFORM DEPLOYMENT
# ======================================================

- stage: Deploy
  displayName: Deploy Application
  dependsOn: Build

  jobs:

  - job: TerraformDeploy
    displayName: Terraform Apply Deployment

    steps:

    - checkout: self

    - powershell: |
        Write-Host "================================="
        Write-Host "Starting Terraform Deployment"
        Write-Host "================================="

        cd terraform/environments/dev

        terraform init
        terraform plan
        terraform apply -auto-approve
      displayName: Terraform Apply
